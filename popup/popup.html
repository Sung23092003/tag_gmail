<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gmail Tagger</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>

<body>
  <div class="container">
    <header>
      <h1>Gmail Tagger</h1>
      <p>Quản lý tags của bạn</p>
    </header>

    <div id="tag-list" class="tag-list">
      <!-- Tags will be loaded here -->
    </div>

    <button id="add-tag-btn" class="primary-btn">
      <span class="plus-icon">+</span> Thêm Tag Mới
    </button>

    <div id="tag-form" class="tag-form hidden">
      <div class="form-group">
        <label for="tag-name">Tên Tag</label>
        <input type="text" id="tag-name" placeholder="Ví dụ: Công việc, Gia đình...">
      </div>

      <div class="form-group">
        <label>Chọn Màu</label>
        <div class="color-presets">
          <div class="color-option" style="background: #ff4d4d;" data-color="#ff4d4d"></div>
          <div class="color-option" style="background: #ffbd44;" data-color="#ffbd44"></div>
          <div class="color-option" style="background: #28c840;" data-color="#28c840"></div>
          <div class="color-option" style="background: #3399ff;" data-color="#3399ff"></div>
          <div class="color-option" style="background: #a366ff;" data-color="#a366ff"></div>
          <input type="color" id="tag-color" value="#3399ff">
        </div>
      </div>

      <div class="form-group">
        <label for="tag-icon">Biểu tượng (Emoji, Material Icon Name, hoặc FA HTML)</label>
        <input type="text" id="tag-icon" placeholder="star, briefcase, check, hoặc biểu tượng 💼">
      </div>

      <input type="hidden" id="edit-tag-id">

      <div class="form-actions">
        <button id="cancel-btn" class="secondary-btn">Hủy</button>
        <button id="save-tag-btn" class="primary-btn">Lưu Tag</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
